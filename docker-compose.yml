# Запуск: docker compose up --build
# Приложение: http://localhost:8080 (Swagger: /swagger-ui.html)
#
# Пароли и прочее можно переопределить через файл .env рядом с compose
# (синтаксис ${VAR:-default} подставит значение из окружения или дефолт).

services:

  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: task-manager-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_manager}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      # Наружу порт открыт для удобства локальной отладки (psql, DBeaver).
      # Приложению он не нужен — оно ходит к базе по внутренней сети.
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-task_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - task-manager-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-manager-app
    environment:
      SPRING_PROFILES_ACTIVE: production
      # Хост базы — имя сервиса postgres, DNS внутри compose-сети
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-task_manager}
      JDBC_DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      JDBC_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "8080:8080"
    depends_on:
      # Ждём не просто старта контейнера, а готовности базы принимать
      # соединения — иначе приложение упадёт на первом коннекте.
      postgres:
        condition: service_healthy
    networks:
      - task-manager-network
    restart: unless-stopped

volumes:
  # Именованный volume — данные переживают docker compose down.
  # Снести базу полностью: docker compose down -v
  postgres_data:
    driver: local

networks:
  task-manager-network:
    driver: bridge